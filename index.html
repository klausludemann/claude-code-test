<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      gap: 32px;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: #111;
    }
  </style>
</head>
<body>

  <svg id="globe" width="220" height="220" viewBox="-110 -110 220 220" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <clipPath id="globe-clip">
        <circle cx="0" cy="0" r="90"/>
      </clipPath>
    </defs>

    <!-- Static latitude lines -->
    <g clip-path="url(#globe-clip)" fill="none" stroke="#1a6b3a" stroke-width="0.8">
      <ellipse cx="0" cy="-45" rx="77.9" ry="15"/>
      <ellipse cx="0" cy="-22" rx="87.3" ry="25"/>
      <ellipse cx="0" cy="22"  rx="87.3" ry="25"/>
      <ellipse cx="0" cy="45"  rx="77.9" ry="15"/>
    </g>

    <!-- Equator -->
    <line x1="-90" y1="0" x2="90" y2="0" stroke="#1a6b3a" stroke-width="0.8"
          stroke-dasharray="4 3" clip-path="url(#globe-clip)"/>

    <!-- Animated longitude lines -->
    <g id="meridians" clip-path="url(#globe-clip)"></g>

    <!-- Outer circle -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="#222" stroke-width="1.5"/>

    <!-- Axis dots -->
    <circle cx="0" cy="-90" r="2.5" fill="#222"/>
    <circle cx="0" cy="90"  r="2.5" fill="#222"/>

    <!-- Tick marks -->
    <line x1="-96" y1="0" x2="-84" y2="0" stroke="#222" stroke-width="1.2"/>
    <line x1="84"  y1="0" x2="96"  y2="0" stroke="#222" stroke-width="1.2"/>
    <line x1="0" y1="-96" x2="0" y2="-84" stroke="#222" stroke-width="1.2"/>
    <line x1="0" y1="84"  x2="0" y2="96"  stroke="#222" stroke-width="1.2"/>

    <!-- Corner brackets -->
    <g stroke="#aaa" stroke-width="0.8" fill="none">
      <path d="M-105,-105 L-95,-105 M-105,-105 L-105,-95"/>
      <path d="M105,-105  L95,-105  M105,-105  L105,-95"/>
      <path d="M-105,105  L-95,105  M-105,105  L-105,95"/>
      <path d="M105,105   L95,105   M105,105   L105,95"/>
    </g>

    <!-- Degree labels -->
    <g font-family="Courier New, monospace" font-size="7" fill="#888" text-anchor="middle">
      <text x="0"   y="-93" dy="-3">90°</text>
      <text x="0"   y="103">90°</text>
      <text x="-93" y="3" text-anchor="end">0°</text>
      <text x="97"  y="3" text-anchor="start">0°</text>
    </g>
  </svg>

  <h1>Hello World</h1>

  <script>
    const R = 90;
    const N = 6; // meridian planes (every 30°)
    const group = document.getElementById('meridians');
    const NS = 'http://www.w3.org/2000/svg';

    const ellipses = Array.from({length: N}, () => {
      const el = document.createElementNS(NS, 'ellipse');
      el.setAttribute('cx', 0);
      el.setAttribute('cy', 0);
      el.setAttribute('ry', R);
      el.setAttribute('fill', 'none');
      group.appendChild(el);
      return el;
    });

    let angle = 0;

    function frame() {
      angle += 0.004; // one full rotation ~26 s at 60 fps

      for (let i = 0; i < N; i++) {
        const phi = angle + (i * Math.PI / N);
        const rx  = Math.abs(Math.sin(phi)) * R;
        const front = Math.cos(phi) >= 0;

        ellipses[i].setAttribute('rx', rx);
        ellipses[i].setAttribute('stroke', front ? '#1a6b3a' : '#60b080');
        ellipses[i].setAttribute('stroke-width', front ? '0.8' : '0.5');
        ellipses[i].setAttribute('stroke-dasharray', front ? 'none' : '2 3');
      }

      requestAnimationFrame(frame);
    }

    frame();
  </script>

</body>
</html>
